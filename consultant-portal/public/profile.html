<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile · Zolve Tangent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,560;9..144,650&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../../shared/design-tokens.css" />
<link rel="stylesheet" href="../../shared/css/app-nav.css" />
<link rel="stylesheet" href="../../shared/css/components.css" />
<link rel="stylesheet" href="css/portal.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><span class="brand-mark">Z</span><span class="brand-name">Zolve <span class="brand-accent">Tangent</span></span></div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="index.html"><i class="fa-solid fa-user-graduate"></i> My Students</a>
        <a class="nav-item active" href="profile.html"><i class="fa-solid fa-id-badge"></i> Profile</a>
      </nav>
    </aside>
    <main class="main" style="max-width:520px;">
      <div id="ztTopbar" class="zt-topbar"></div>
      <header class="main-header"><div><h1>Profile</h1><p class="subtitle">Your details as seen by the internal team.</p></div></header>
      <form id="profileForm" class="table-card" style="padding:24px;">
        <div class="form-field"><label>Full name</label><input name="full_name" type="text" /></div>
        <div class="form-field"><label>Email</label><input name="email" type="email" disabled /></div>
        <div class="form-field"><label>Phone</label><input name="phone" type="tel" /></div>
        <button type="submit" class="btn btn-primary" style="margin-top:8px;">Save changes</button>
      </form>
    </main>
  </div>
  <div class="toast" id="toast" hidden></div>
  <script src="../../shared/env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
