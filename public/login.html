<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · EduFin Loan Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,560;9..144,650&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../../shared/design-tokens.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark">E</span>
        <span class="brand-name">EduFin<span class="brand-accent">Ops</span></span>
      </div>
      <h1>Sign in</h1>
      <p class="auth-subtitle">Use the email and password your admin set up for you.</p>

      <form id="loginForm" novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
        </div>
        <div class="auth-error" id="authError" hidden></div>
        <button type="submit" class="btn btn-primary" id="btnSignIn" style="width:100%;justify-content:center;margin-top:8px;">Sign in</button>
      </form>

      <a href="forgot-password.html" class="auth-link">Forgot your password?</a>
    </div>
  </div>

  <script src="../../shared/env.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
