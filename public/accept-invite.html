<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set your password · EduFin Loan Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,560;9..144,650&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../../shared/design-tokens.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card" id="setPasswordCard">
      <div class="auth-brand">
        <span class="brand-mark">E</span>
        <span class="brand-name">EduFin<span class="brand-accent">Ops</span></span>
      </div>
      <h1 id="pageTitle">Set your password</h1>
      <p class="auth-subtitle" id="pageSubtitle">Welcome — choose a password to activate your account.</p>
      <form id="setPasswordForm" novalidate>
        <div class="form-field">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="form-field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="auth-error" id="authError" hidden></div>
        <button type="submit" class="btn btn-primary" id="btnSetPassword" style="width:100%;justify-content:center;">Set password and continue</button>
      </form>
    </div>

    <div class="auth-card" id="doneCard" hidden style="text-align:center;">
      <div class="auth-success-icon"><i class="fa-solid fa-check"></i></div>
      <h1>You're all set</h1>
      <p class="auth-subtitle" id="doneMessage">Taking you to your workspace…</p>
    </div>
  </div>

  <script src="../../shared/env.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/accept-invite.js"></script>
</body>
</html>
