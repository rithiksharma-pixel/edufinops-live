<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Users · Zolve Tangent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,560;9..144,650&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../../shared/design-tokens.css" />
<link rel="stylesheet" href="css/users-admin.css" />
</head>
<body>
  <div class="page">
    <div style="margin-bottom:14px;"><a href="data-tools.html" style="font-size:13px;color:var(--accent);text-decoration:none;">Export / Import data →</a></div>
    <header class="page-header">
      <div>
        <h1>Manage users</h1>
        <p class="subtitle">Invite teammates, adjust roles, and deactivate accounts.</p>
      </div>
      <button class="btn btn-primary" id="btnInvite"><i class="fa-solid fa-user-plus"></i> Invite user</button>
    </header>

    <section class="table-card">
      <h2 class="section-title">Active team</h2>
      <table class="data-table">
        <thead>
          <tr><th>Name</th><th>Role</th><th>Reporting manager</th><th>Team</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="usersTableBody"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </section>

    <section class="table-card" style="margin-top:24px;">
      <h2 class="section-title">Pending invitations</h2>
      <table class="data-table">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Role</th><th>Invited</th><th>Expires</th><th></th></tr>
        </thead>
        <tbody id="invitesTableBody"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </section>
  </div>

  <div class="modal-overlay" id="inviteModalOverlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>Invite a user</h2>
        <button class="icon-btn" id="btnCloseInviteModal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="inviteForm" class="modal-body" novalidate>
        <div class="form-field"><label>Full name *</label><input name="full_name" type="text" required /></div>
        <div class="form-field"><label>Email *</label><input name="email" type="email" required /></div>
        <div class="form-field"><label>Role *</label><select name="role_id" id="inviteRoleSelect" required></select></div>
        <div class="form-field" id="managerField" hidden><label>Reporting manager</label><select name="reporting_manager_id" id="inviteManagerSelect"></select></div>
        <div class="form-field" id="teamField" hidden><label>Team *</label><select name="team_id" id="inviteTeamSelect"></select></div>
        <div class="form-field" id="lenderOrgField" hidden><label>Lender institution *</label><select name="lender_organization_id" id="inviteLenderOrgSelect"></select></div>
        <div class="form-field" id="lenderBranchField" hidden><label>Branch *</label><select name="lender_branch_id" id="inviteLenderBranchSelect"></select></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="btnCancelInvite">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btnSubmitInvite">Send invite</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="../../shared/env.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/users-admin.js"></script>
</body>
</html>
