<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password · EduFin Loan Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,560;9..144,650&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../shared/design-tokens.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card" id="requestCard">
      <div class="auth-brand">
        <span class="brand-mark">E</span>
        <span class="brand-name">EduFin<span class="brand-accent">Ops</span></span>
      </div>
      <h1>Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
      <form id="resetForm" novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="username" />
        </div>
        <div class="auth-error" id="authError" hidden></div>
        <button type="submit" class="btn btn-primary" id="btnSend" style="width:100%;justify-content:center;">Send reset link</button>
      </form>
      <a href="login.html" class="auth-link">Back to sign in</a>
    </div>

    <div class="auth-card" id="sentCard" hidden style="text-align:center;">
      <div class="auth-success-icon"><i class="fa-solid fa-check"></i></div>
      <h1>Check your email</h1>
      <p class="auth-subtitle">If an account exists for that address, a reset link is on its way.</p>
      <a href="login.html" class="auth-link">Back to sign in</a>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="../../shared/env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
